#cloud-config
# Placeholders filled by Bicep format(): {0}=tailscaleAuthKey  {1}=hostname
package_update: true
package_upgrade: false

write_files:
  # Bind Ollama to the tailnet interface range; access controlled by Tailscale ACLs.
  - path: /etc/systemd/system/ollama.service.d/override.conf
    content: |
      [Service]
      Environment="OLLAMA_HOST=0.0.0.0:11434"
      Environment="OLLAMA_MODELS=/mnt/models"

  - path: /etc/systemd/system/tailscale-serve.service
    content: |
      [Unit]
      Description=Tailscale Serve for Open WebUI
      After=tailscaled.service network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/tailscale serve --bg --https=443 http://127.0.0.1:8080
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target

  # Runs once after reboot to install Tailscale, Ollama, Docker, Open WebUI.
  # Disabled by ExecStartPost so it never runs again on subsequent boots.
  - path: /etc/systemd/system/setup-phase2.service
    content: |
      [Unit]
      Description=Post-reboot setup: Tailscale, Ollama, Docker, Open WebUI
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/setup-phase2.sh
      ExecStartPost=/bin/systemctl disable setup-phase2.service
      RemainAfterExit=yes
      StandardOutput=journal+console

      [Install]
      WantedBy=multi-user.target

  - path: /usr/local/bin/qwen-start
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      if ! ollama list | grep -q 'qwen2.5-32b-128k'; then
        echo "==> Pulling qwen2.5:32b..."
        ollama pull qwen2.5:32b
        echo "==> Creating qwen2.5-32b-128k with 128k context..."
        MODELFILE=$(mktemp /tmp/Modelfile.XXXXXX)
        printf 'FROM qwen2.5:32b\nPARAMETER num_ctx 131072\n' > "$MODELFILE"
        ollama create qwen2.5-32b-128k -f "$MODELFILE"
        rm "$MODELFILE"
      fi
      ollama run qwen2.5-32b-128k

  - path: /usr/local/bin/qwen72b-start
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      if ! ollama list | grep -q 'qwen2.5-72b-32k'; then
        echo "==> Pulling qwen2.5:72b..."
        ollama pull qwen2.5:72b
        echo "==> Creating qwen2.5-72b-32k with 32k context..."
        MODELFILE=$(mktemp /tmp/Modelfile.XXXXXX)
        printf 'FROM qwen2.5:72b\nPARAMETER num_ctx 32768\n' > "$MODELFILE"
        ollama create qwen2.5-72b-32k -f "$MODELFILE"
        rm "$MODELFILE"
      fi
      ollama run qwen2.5-72b-32k

  - path: /usr/local/bin/deepseek-r1-32k-start
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      if ! ollama list | grep -q 'deepseek-r1-32k'; then
        echo "==> Pulling deepseek-r1:14b..."
        ollama pull deepseek-r1:14b
        echo "==> Creating deepseek-r1-32k with 32k context..."
        MODELFILE=$(mktemp /tmp/Modelfile.XXXXXX)
        printf 'FROM deepseek-r1:14b\nPARAMETER num_ctx 32768\n' > "$MODELFILE"
        ollama create deepseek-r1-32k -f "$MODELFILE"
        rm "$MODELFILE"
      fi
      ollama run deepseek-r1-32k

  - path: /usr/local/bin/start
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      if tmux has-session -t vm 2>/dev/null; then
        echo "Session 'vm' already exists. Use attach-start to resume it."
        exit 1
      fi

      # Window 0: shell (top) | ollama logs + nvidia-smi (bottom)
      tmux new-session -d -s vm
      tmux split-window -v -t vm
      tmux send-keys -t vm:0.1 'journalctl -fu ollama' Enter
      tmux split-window -h -t vm:0.1
      tmux send-keys -t vm:0.2 'watch -n1 nvidia-smi' Enter
      tmux select-pane -t vm:0.1
      tmux resize-pane -t vm:0.1 -y 30
      tmux select-pane -t vm:0.0

      # Window 1: observability health
      tmux new-window -t vm
      sleep 0.3
      tmux split-window -h -t vm:1
      sleep 0.3
      tmux split-window -v -t vm:1.0
      sleep 0.3
      tmux split-window -v -t vm:1.1
      sleep 0.3
      tmux send-keys -t vm:1.0 'watch -n5 systemctl status alloy' Enter
      tmux send-keys -t vm:1.1 'watch -n5 systemctl status nvidia-gpu-exporter' Enter
      tmux send-keys -t vm:1.2 'journalctl -fu setup-phase2' Enter
      tmux send-keys -t vm:1.3 'watch -n5 "curl -s http://localhost:11434/api/ps"' Enter

      tmux select-window -t vm:0
      tmux attach-session -t vm

  - path: /usr/local/bin/attach-start
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      tmux attach-session -t vm

  - path: /etc/systemd/system/nvidia-gpu-exporter.service
    content: |
      [Unit]
      Description=NVIDIA GPU Exporter
      After=network.target

      [Service]
      ExecStart=/usr/local/bin/nvidia_gpu_exporter
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

  - path: /etc/alloy/credentials.env
    permissions: '0600'
    content: |
      GRAFANA_CLOUD_PROM_URL={2}
      GRAFANA_CLOUD_PROM_USER={3}
      GRAFANA_CLOUD_API_KEY={4}

  - path: /etc/systemd/system/alloy.service.d/override.conf
    content: |
      [Service]
      EnvironmentFile=/etc/alloy/credentials.env

  # Phase 1: disk setup + NVIDIA drivers. Reboots when done.
  - path: /usr/local/bin/setup-phase1.sh
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euxo pipefail

      # --- Persistent data disk (LUN 0) for models ---
      DISK=$(ls /dev/disk/azure/scsi1/lun0 2>/dev/null || true)
      DISK=$(readlink -f "$DISK")
      if [ -n "$DISK" ]; then
        if ! blkid "$DISK"; then
          mkfs.ext4 -F "$DISK"
        fi
        mkdir -p /mnt/models
        UUID=$(blkid -s UUID -o value "$DISK")
        grep -q "$UUID" /etc/fstab || echo "UUID=$UUID /mnt/models ext4 defaults,nofail 0 2" >> /etc/fstab
        mount -a
      fi

      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y jq curl ubuntu-drivers-common tmux
      ubuntu-drivers install

      # Schedule phase 2 to run after reboot, then reboot to activate drivers.
      systemctl enable setup-phase2.service
      reboot

  # Phase 2: runs on first boot after driver reboot.
  - path: /usr/local/bin/setup-phase2.sh
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euxo pipefail

      # --- Tailscale (with Tailscale SSH) ---
      curl -fsSL https://tailscale.com/install.sh | sh
      tailscale up --ssh --authkey="{0}" --hostname="{1}" --accept-routes

      # --- Ollama ---
      curl -fsSL https://ollama.com/install.sh | sh
      mkdir -p /mnt/models
      chown -R ollama:ollama /mnt/models || true
      systemctl daemon-reload
      systemctl enable --now ollama

      # --- Docker (for Open WebUI) ---
      curl -fsSL https://get.docker.com | sh
      systemctl enable --now docker

      # --- Open WebUI (browser UI for Ollama) ---
      mkdir -p /mnt/models/open-webui
      docker run -d --restart always \
        --name open-webui \
        -p 127.0.0.1:8080:8080 \
        -e OLLAMA_BASE_URL=http://host.docker.internal:11434 \
        --add-host host.docker.internal:host-gateway \
        -v /mnt/models/open-webui:/app/backend/data \
        ghcr.io/open-webui/open-webui:main

      # --- Expose Open WebUI over the tailnet with HTTPS (Tailscale Serve) ---
      systemctl enable --now tailscale-serve

      # --- Observability: nvidia_gpu_exporter ---
      curl -fsSL https://github.com/utkuozdemir/nvidia_gpu_exporter/releases/download/v1.4.1/nvidia_gpu_exporter_1.4.1_linux_x86_64.tar.gz \
        | tar -xz -C /tmp
      mv /tmp/nvidia_gpu_exporter /usr/local/bin/nvidia_gpu_exporter
      chmod +x /usr/local/bin/nvidia_gpu_exporter
      systemctl enable --now nvidia-gpu-exporter

      # --- Observability: Grafana Alloy ---
      curl -fsSL https://apt.grafana.com/gpg.key \
        | gpg --dearmor -o /etc/apt/keyrings/grafana.gpg
      echo "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main" \
        > /etc/apt/sources.list.d/grafana.list
      apt-get update -qq
      apt-get install -y alloy

      # Write config after install so the package cannot overwrite it.
      mkdir -p /etc/alloy
      cat > /etc/alloy/config.alloy << 'ALLOYEOF'
      prometheus.exporter.unix "node" {{}}

      prometheus.scrape "node" {{
        targets    = prometheus.exporter.unix.node.targets
        forward_to = [prometheus.remote_write.grafana_cloud.receiver]
      }}

      prometheus.scrape "nvidia_gpu" {{
        targets = [{{
          __address__ = "localhost:9835",
        }}]
        forward_to = [prometheus.remote_write.grafana_cloud.receiver]
      }}

      prometheus.remote_write "grafana_cloud" {{
        endpoint {{
          url = env("GRAFANA_CLOUD_PROM_URL")
          basic_auth {{
            username = env("GRAFANA_CLOUD_PROM_USER")
            password = env("GRAFANA_CLOUD_API_KEY")
          }}
        }}
      }}
      ALLOYEOF

      systemctl daemon-reload
      systemctl enable --now alloy

runcmd:
  - /usr/local/bin/setup-phase1.sh
