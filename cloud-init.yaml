#cloud-config
package_update: true
package_upgrade: false

write_files:
  # Bind Ollama to the tailnet interface range; access controlled by Tailscale ACLs.
  - path: /etc/systemd/system/ollama.service.d/override.conf
    content: |
      [Service]
      Environment="OLLAMA_HOST=0.0.0.0:11434"
      Environment="OLLAMA_MODELS=/mnt/models"

  - path: /etc/systemd/system/tailscale-serve.service
    content: |
      [Unit]
      Description=Tailscale Serve for Open WebUI
      After=tailscaled.service network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/tailscale serve --bg --https=443 http://127.0.0.1:8080
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target

  - path: /usr/local/bin/qwen-start
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      if ! ollama list | grep -q 'qwen2.5-32b-128k'; then
        echo "==> Pulling qwen2.5:32b..."
        ollama pull qwen2.5:32b
        echo "==> Creating qwen2.5-32b-128k with 128k context..."
        MODELFILE=$(mktemp /tmp/Modelfile.XXXXXX)
        printf 'FROM qwen2.5:32b\nPARAMETER num_ctx 131072\n' > "$MODELFILE"
        ollama create qwen2.5-32b-128k -f "$MODELFILE"
        rm "$MODELFILE"
      fi
      ollama run qwen2.5-32b-128k

  - path: /usr/local/bin/qwen72b-start
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      if ! ollama list | grep -q 'qwen2.5-72b-32k'; then
        echo "==> Pulling qwen2.5:72b..."
        ollama pull qwen2.5:72b
        echo "==> Creating qwen2.5-72b-32k with 32k context..."
        MODELFILE=$(mktemp /tmp/Modelfile.XXXXXX)
        printf 'FROM qwen2.5:72b\nPARAMETER num_ctx 32768\n' > "$MODELFILE"
        ollama create qwen2.5-72b-32k -f "$MODELFILE"
        rm "$MODELFILE"
      fi
      ollama run qwen2.5-72b-32k

  - path: /usr/local/bin/qwen14b-start
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      if ! ollama list | grep -q 'qwen2.5-14b-20k'; then
        echo "==> Pulling qwen2.5:14b..."
        ollama pull qwen2.5:14b
        echo "==> Creating qwen2.5-14b-20k with 20k context..."
        MODELFILE=$(mktemp /tmp/Modelfile.XXXXXX)
        printf 'FROM qwen2.5:14b\nPARAMETER num_ctx 20480\n' > "$MODELFILE"
        ollama create qwen2.5-14b-20k -f "$MODELFILE"
        rm "$MODELFILE"
      fi
      ollama run qwen2.5-14b-20k

  - path: /usr/local/bin/deepseek-r1-32k-start
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      if ! ollama list | grep -q 'deepseek-r1-32k'; then
        echo "==> Pulling deepseek-r1:14b..."
        ollama pull deepseek-r1:14b
        echo "==> Creating deepseek-r1-32k with 32k context..."
        MODELFILE=$(mktemp /tmp/Modelfile.XXXXXX)
        printf 'FROM deepseek-r1:14b\nPARAMETER num_ctx 32768\n' > "$MODELFILE"
        ollama create deepseek-r1-32k -f "$MODELFILE"
        rm "$MODELFILE"
      fi
      ollama run deepseek-r1-32k

  - path: /usr/local/bin/start
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      if tmux has-session -t vm 2>/dev/null; then
        echo "Session 'vm' already exists. Use attach-start to resume it."
        exit 1
      fi

      # Window 0: shell (top) | ollama logs + nvidia-smi (bottom)
      tmux new-session -d -s vm
      tmux split-window -v -t vm
      tmux send-keys -t vm:0.1 'journalctl -fu ollama' Enter
      tmux split-window -h -t vm:0.1
      tmux send-keys -t vm:0.2 'watch -n1 nvidia-smi' Enter
      tmux select-pane -t vm:0.1
      tmux resize-pane -t vm:0.1 -y 30
      tmux select-pane -t vm:0.0

      tmux select-window -t vm:0
      tmux attach-session -t vm

  - path: /usr/local/bin/attach-start
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      tmux attach-session -t vm

  - path: /etc/systemd/system/nvidia-gpu-exporter.service
    content: |
      [Unit]
      Description=NVIDIA GPU Exporter
      After=network.target

      [Service]
      ExecStart=/usr/local/bin/nvidia_gpu_exporter
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/alloy.service.d/override.conf
    content: |
      [Service]
      EnvironmentFile=/etc/alloy/credentials.env
