name: deploy-extensions

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RG: ${{ secrets.AZURE_RG }}

jobs:
  deploy-extensions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Filebrowser
        run: |
          az vm run-command invoke \
            --resource-group "$AZURE_RG" \
            --name "ollama-vm-1" \
            --command-id RunShellScript \
            --scripts @scripts/deployment/ext-filebrowser.sh

      - name: hyper-extract
        run: |
          az vm run-command invoke \
            --resource-group "$AZURE_RG" \
            --name "ollama-vm-1" \
            --command-id RunShellScript \
            --scripts @scripts/deployment/ext-hyper-extract.sh
