name: deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RG: ${{ secrets.AZURE_RG }}
  LOCATION: ${{ secrets.AZURE_LOCATION }}
  DEPLOYMENT_NAME: ollama-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        uses: azure/cli@v2
        with:
          inlineScript: |
            az group create --name "$AZURE_RG" --location "$LOCATION" -o none

      - name: Assemble cloud-init
        run: python3 scripts/build-cloud-init.py

      - name: Deploy Bicep
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group create \
              --resource-group "$AZURE_RG" \
              --name "$DEPLOYMENT_NAME" \
              --template-file main.bicep \
              --parameters parameters.json \
              --parameters \
                  sshPublicKey="${{ secrets.SSH_PUB }}" \
                  tailscaleAuthKey="${{ secrets.TS_AUTHKEY }}" \
              -o table

      - name: Show outputs
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group show \
              --resource-group "$AZURE_RG" \
              --name "$DEPLOYMENT_NAME" \
              --query properties.outputs -o json || true
