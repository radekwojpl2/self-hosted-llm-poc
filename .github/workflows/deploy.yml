name: deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RG: ${{ secrets.AZURE_RG }}
  LOCATION: ${{ secrets.AZURE_LOCATION }}
  DEPLOYMENT_NAME: ollama-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        run: az group create --name "$AZURE_RG" --location "$LOCATION" -o none

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group "$AZURE_RG" \
            --name "$DEPLOYMENT_NAME" \
            --template-file main.bicep \
            --parameters parameters.json \
            --parameters \
                sshPublicKey="${{ secrets.SSH_PUB }}" \
                tailscaleAuthKey="${{ secrets.TS_AUTHKEY }}" \
                grafanaCloudPromUrl="${{ secrets.GRAFANA_CLOUD_PROM_URL }}" \
                grafanaCloudPromUser="${{ secrets.GRAFANA_CLOUD_PROM_USER }}" \
                grafanaCloudApiKey="${{ secrets.GRAFANA_CLOUD_API_KEY }}" \
            -o table

      - name: Show outputs
        run: |
          az deployment group show \
            --resource-group "$AZURE_RG" \
            --name "$DEPLOYMENT_NAME" \
            --query properties.outputs -o json || true

      - name: Phase 1 - disk setup + NVIDIA drivers
        run: |
          az vm run-command invoke \
            --resource-group "$AZURE_RG" \
            --name "ollama-vm-1" \
            --command-id RunShellScript \
            --scripts @scripts/deployment/phase1.sh

      - name: Restart VM (activate NVIDIA drivers)
        run: az vm restart --resource-group "$AZURE_RG" --name "ollama-vm-1"

      - name: Wait for VM running
        run: |
          az vm wait \
            --resource-group "$AZURE_RG" \
            --name "ollama-vm-1" \
            --updated --interval 15 --timeout 300

      - name: Phase 2a - Tailscale
        run: |
          az vm run-command invoke \
            --resource-group "$AZURE_RG" \
            --name "ollama-vm-1" \
            --command-id RunShellScript \
            --scripts @scripts/deployment/phase2-tailscale.sh \
            --parameters "${{ secrets.TS_AUTHKEY }}" "ollama-vm-1"

      - name: Phase 2b - Ollama
        run: |
          az vm run-command invoke \
            --resource-group "$AZURE_RG" \
            --name "ollama-vm-1" \
            --command-id RunShellScript \
            --scripts @scripts/deployment/phase2-ollama.sh

      - name: Phase 2c - Docker
        run: |
          az vm run-command invoke \
            --resource-group "$AZURE_RG" \
            --name "ollama-vm-1" \
            --command-id RunShellScript \
            --scripts @scripts/deployment/phase2-docker.sh

      - name: Phase 2d - Open WebUI + Tailscale Serve
        run: |
          az vm run-command invoke \
            --resource-group "$AZURE_RG" \
            --name "ollama-vm-1" \
            --command-id RunShellScript \
            --scripts @scripts/deployment/phase2-webui.sh

      - name: Phase 2e - NVIDIA GPU Exporter
        run: |
          az vm run-command invoke \
            --resource-group "$AZURE_RG" \
            --name "ollama-vm-1" \
            --command-id RunShellScript \
            --scripts @scripts/deployment/phase2-nvidia-exporter.sh

      - name: Phase 2f - Grafana Alloy credentials
        run: |
          az vm run-command invoke \
            --resource-group "$AZURE_RG" \
            --name "ollama-vm-1" \
            --command-id RunShellScript \
            --scripts "mkdir -p /etc/alloy && printf 'GRAFANA_CLOUD_PROM_URL=%s\nGRAFANA_CLOUD_PROM_USER=%s\nGRAFANA_CLOUD_API_KEY=%s\n' '${{ secrets.GRAFANA_CLOUD_PROM_URL }}' '${{ secrets.GRAFANA_CLOUD_PROM_USER }}' '${{ secrets.GRAFANA_CLOUD_API_KEY }}' > /etc/alloy/credentials.env && chmod 600 /etc/alloy/credentials.env"

      - name: Phase 2f - Grafana Alloy install
        run: |
          az vm run-command invoke \
            --resource-group "$AZURE_RG" \
            --name "ollama-vm-1" \
            --command-id RunShellScript \
            --scripts @scripts/deployment/phase2-alloy.sh
